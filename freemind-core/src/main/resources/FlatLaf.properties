# FlatLaf theme customizations for FreeMind
# Place on classpath root so FlatLaf picks it up automatically

# --- Typography ---
@background = #d9d0b4
defaultFont = 12 "Segoe UI", "Noto Sans", "Liberation Sans", Arial

# --- Component styling ---
Button.arc = 6
Component.arc = 6
Component_focusWidth = 1
Component_innerFocusWidth = 0
Component.borderWidth = 0
Component.unfocusedBackground = null

# --- Toolbar ---
ToolBar.background = $Panel.background
ToolBar.border = 0,0,1,0,$Component.borderColor
ToolBar.isRollover = true

# --- Menus ---
MenuBar.selectionBackground = $Button.background
MenuBar.selectionForeground = $Menu.foreground
MenuItem.selectionBackground = $List.selectionBackground
MenuItem.selectionForeground = $List.selectionForeground
MenuItem.borderPainted = false
Menu.borderPainted = false
Menu.windowInputMapBinder = com.formdev.flatlaf.ui.FlatUIUtils$FocusedInputMapBinder

# --- Tabs ---
TabbedPane.tabClostButtonWidth = 16
TabbedPane.tabAlignment = leading
TabbedPane.tabInsets = 0,12,0,12
TabbedPane.tabAreaBackground = null

# --- Trees & Tables ---
Tree.background = $List.background
Tree.showRootHandles = true
Table.showHorizontalLines = false
Table.showVerticalLines = false
Table.intercellSpacing = 0,1

# --- ScrollBars ---
ScrollBar.showButtons = false
ScrollBar.width = 10
ScrollBar.thumbArc = 999
ScrollBar.trackArc = 999

# --- SplitPane ---
SplitPaneDivider.draggingColor = $Component.focusColor

# --- Focus ---
Component.focusColor = hsl(210,60%,50%,30%)
Component.focusedBorderColor = hsl(210,60%,50%)

# --- FreeMind mindmap view ---
# Slightly off-white background for the canvas
Panel.background = #fafafa
